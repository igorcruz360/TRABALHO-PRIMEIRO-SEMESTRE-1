<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./imagens/miles morales.ico" type="image/x-icon">
    <title>Contato</title>
</head>

<body>
    <a href="./index.html"> <img src="./imagens/home.png" alt="home" width="50"></a>
    <th><a href="./servilos.html"><img src="./imagens/serviços.png" alt="Serviços" width="50"></a></th>
    <th><a href="./git.html"><img src="./imagens/githubimage.png" alt="GitHub" width="50"></a></th>
    <th><a href="./curriculo.html"><img src="./imagens/curriculo.png" alt="Curriculo" width="50"></a></th>
    <th><a href="./contato.html"> <img src="./imagens/telefone.png" alt="Contato" width="50"></a></th>
    <hr>
    <p>Deixe seus dados para que eu entre em contato com você, caso queira os meus servços :]</p>

    <form action="" method="post">

        <table border="2">

            <tr>
                <td><label for="nome">Nome:</label></td>
                <td><input type="text" id="nome" name="nome"></td>
            </tr>

            <tr>
                <td><label for="tel">Telefone:</label></td>
                <td><input type="tel" id="tel" name="tel"></td>
            </tr>

            <tr>
                <td><label for="email">Email:</label></td>
                <td><input type="email" id="email" name="email"></td>
            </tr>

            <tr>
                <td><label for="time">Melhor horário:</label></td>
                <td><input type="time" name="time" id="time"></td>
            </tr>

            <tr>
                <td>Tipo de serviço:</td>
                <td>
                    <input type="checkbox" name="site esttico lvl 1"> Site Estático (1 a 2 páginas)
                    <br>
                    <input type="checkbox" name="site estatico lvl 2"> Site Estático (3 a 5 páginas)
                    <br>
                    <input type="checkbox" name="site estatico lvl 3"> Site Estático (mais de 5 páginas)
                    <br>
                    <input type="checkbox" name="site dinamico"> Site Dinâmico
                    <br>
                    <input type="checkbox" name="site avançado"> Site Avançado
                </td>
            </tr>
            <tr>
                <td><label for="orçamento">Orçamento:</label></td>
                <td><input type="number" id="orçamento" name="orçamento"></td>
            </tr>
            <tr>
                <td>Descrição:</td>
                <td>
                    <textarea name="descricao" cols="40" rows="5"></textarea>
                </td>
            </tr>

            <tr>
                <td colspan="2">
                    <input type="submit" value="Enviar">
                    <input type="reset" value="Limpar">
                </td>
            </tr>

        </table>

    </form>

</body>

</html>
